name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    name: Lint, Test & Build (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: true
      matrix:
        node: [22, 24, current]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}

      - name: Install packages
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Lint and Format
        run: pnpm check

      - name: Typecheck
        run: pnpm typecheck

      - name: Test coverage
        if: matrix.node != 22
        run: pnpm test:cov

      # Node 22 cannot parse `await using`; exclude *.esnext.test.ts files.
      - name: Test coverage (Node 22)
        if: matrix.node == 22
        run: pnpm test:cov:node22

      - name: Coveralls
        if: matrix.node == 'current'
        uses: coverallsapp/github-action@v2.3.6
